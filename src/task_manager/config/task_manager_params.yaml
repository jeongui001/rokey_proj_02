# task_manager 노드 파라미터 템플릿.
#
# 이 파일의 값 대부분은 아직 실기 캘리브레이션 전이다. 조용히 추측값으로 동작하지
# 않도록, 미합의 수치는 -1(또는 빈 문자열) sentinel로 두었다 - 코드(task_manager_node.py)는
# 이 sentinel을 "미설정"으로 해석해 안전하게 거부(fail-closed)한다.
#
# auto.config_ready가 false인 동안(기본값)에는:
#   - AUTO 모드로 "전환"하는 것 자체는 허용된다.
#   - 그러나 실제 "물체 가져오기" 명령은 실행하지 않고(goal을 보내지 않음),
#     "AUTO 설정값 미확정" detail만 발행한다.
# 실기 검증이 끝난 뒤에만 auto.config_ready를 true로 바꾸고, trigger.*/tools.*의
# 실제 값을 채워 넣는다.
/**:
  ros__parameters:
    auto:
      config_ready: true  # TEMP: 파이프라인 스모크테스트용 임시 활성화 - 실기 캘리브레이션 값 아님, 검증 끝나면 false로 되돌리고 재설정할 것

    # DETECT_TRACK 상태에서 ToolTrack 메시지를 servo_pick 트리거로 인정할지 판단하는
    # 조건들. min_confidence/max_track_age_s/required_frame_id는 vision_node 및 실기
    # 환경과 합의가 끝난 뒤 채워야 하는 값이라 -1/빈 문자열(미설정)로 두었다 - 이
    # 값들이 미설정인 동안 _check_trigger는 항상 False를 반환한다(안전 측 fail-closed).
    trigger:
      min_confidence: 0.3         # TEMP(스모크테스트용 임시값, 범위 0.0~1.0) - 캘리브레이션 필요
      require_depth_valid: true   # 안전한 기본값 - depth 무효 트랙은 신뢰하지 않는다
      require_approaching: true   # 안전한 기본값 - 멀어지는 트랙은 트리거로 쓰지 않는다
      required_frame_id: 'base_link'  # vision_node.py가 ToolTrack publish 시 실제로 쓰는 frame_id
      max_track_age_s: 1.0        # TEMP(스모크테스트용 임시값, 초 단위) - 캘리브레이션 필요

    # 공구별 grasp spec. width_mm/force_n은 servo_pick goal에 실제로 실어 보내는 값,
    # verify_min/max_width_mm은 VERIFY_GRASP에서 final_width_mm 허용 범위다.
    # command_parser.py의 _TOOL_KEYWORDS 값(=YOLO 학습 클래스명)과 반드시 일치해야
    # 한다: bottle, spanner, screw_driver, wrench, pliers, hammer.
    #
    # width_mm=80.0/force_n=30.0은 모든 공구에 우선 동일하게 적용한 테스트값이다
    # (공구 장난감류는 조건이 넉넉하지만, 500ml 물병을 기준으로 필요한 폭/힘에 맞춤).
    # verify_min/max_width_mm은 아직 미확정이라 -1.0으로 남겨뒀다.
    tools:
      bottle:
        width_mm: 20.0
        force_n: 20.0
        verify_min_width_mm: 20.0    # TEMP(스모크테스트용 임시값, mm) - 캘리브레이션 필요
        verify_max_width_mm: 90.0    # TEMP(스모크테스트용 임시값, mm) - 캘리브레이션 필요
      screwdriver:
        # width_mm은 "닫힐 때 목표 폭"이다(RG2Client.close 참고) - 물체(드라이버
        # 손잡이)보다 넓으면 물체에 닿기도 전에 목표 폭에서 멈춰 grip_detected=False가
        # 된다(실기에서 80mm으로 이 문제 확인됨). 손잡이보다 확실히 좁은 값(거의
        # 완전히 닫힘)으로 두어 force 한계에 걸려 멈추게 한다.
        width_mm: 5.0
        force_n: 20.0
        verify_min_width_mm: 0.0     # TEMP(스모크테스트용 임시값, mm) - 캘리브레이션 필요
        verify_max_width_mm: 15.0    # TEMP(스모크테스트용 임시값, mm) - 캘리브레이션 필요
      wrench:
        width_mm: 20.0
        force_n: 20.0
        verify_min_width_mm: 20.0    # TEMP(스모크테스트용 임시값, mm) - 캘리브레이션 필요
        verify_max_width_mm: 90.0    # TEMP(스모크테스트용 임시값, mm) - 캘리브레이션 필요
      hammer:
        width_mm: 20.0
        force_n: 20.0
        verify_min_width_mm: 20.0    # TEMP(스모크테스트용 임시값, mm) - 캘리브레이션 필요
        verify_max_width_mm: 90.0    # TEMP(스모크테스트용 임시값, mm) - 캘리브레이션 필요

    # 아래는 통신/타이밍 관련 값으로, 하드웨어 캘리브레이션 값이 아니다 - 실 환경에
    # 맞게 조정 가능하다.
    detect_track_timeout_s: 55.0
    verify_grasp_max_retries: 2
    wait_pull_timeout_s: 60.0
    wait_pull_reminder_interval_s: 10.0
    cancel_timeout_s: 5.0
    recovery_timeout_s: 5.0
    status_publish_period_s: 1.0
