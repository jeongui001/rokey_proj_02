# robot_control 노드 파라미터 템플릿.
# named_poses.*는 실측 관절각만 채운다 - 비어있으면 해당 pose 이동은 항상 실패 처리된다(robot_control_node._call_move_service 참고).
/**:
  ros__parameters:
    hardware_enabled: true  # 실제 M0609/RG2를 사용하려면 true로 명시적으로 설정

    robot_id: 'dsr01'  # launch의 namespace와 일치해야 함 (DoosanBootcamp 예제 관례)

    rg2_ip: '192.168.1.1'  # 실제 환경에 맞게 변경
    rg2_port: 502
    rg2_gripper: 'rg2'  # 'rg2'/'rg6' - MAX_WIDTH_MM/MAX_FORCE_N 매핑에 사용

    # RG2 명령 완료(busy=0) 대기용 통신 타이밍 설정 (하드웨어 캘리브레이션 아님)
    rg2:
      command_timeout_s: 5.0
      poll_interval_s: 0.05
      # 최대 폭 도달 판정 허용 오차(mm) - 실측 아닌 추정 여유값
      open_width_tolerance_mm: 2.0

    # 빈 배열([])을 override로 명시하면 rclpy가 타입을 못 추론해 미초기화로 남는다(ROS2 Humble) -
    # 값 없는 named pose는 키 자체를 적지 않는다(코드 기본값 []가 적용되어 이동 시 실패 처리됨).
    named_poses:
      home: [0.0, 0.0, 90.0, 0.0, 90.0, 0.0]  # 기본 대기 자세 - HOME 단계에서 복귀 지점
      front: [0.0, 0.0, 90.0, 0.0, 0.0, 0.0]  # 정면 자세 - MANUAL_MOVE 전용(자동 파이프라인에서는 미사용)
      up: [0.0, 0.0, 90.0, 0.0, -90.0, 0.0]   # 위쪽을 보는 자세 - MANUAL_MOVE 전용(자동 파이프라인에서는 미사용)
      down: [0.0, 0.0, 90.0, 0.0, 90.0, 0.0]  # home과 동일 자세로 확인됨(의도된 값)
      # 감시 자세 - MOVE_TO_WATCH 단계에서 사용
      watch: [4.37, 25.40, 23.53, 0.05, 129.71, 95.21]
      handover_safe: [-0.74, 2.30, 96.21, 10.31, 29.68, 90.00]

    # ServoLoop(servo_loop.py) 게인/판정 임계값 - 실기 튜닝 대상
    servo:
      kp_xy: 1.2               # 수평 P 게인, 클수록 오차에 민감하게 반응
      kp_yaw: 1.0               # yaw P 게인(deg 오차 -> deg/s 명령), 클수록 오차에 민감
      # 단위(deg/s)가 달라 v_max와 분리 - 섞으면 0으로 눌리는 버그 있음(_validate_servo_command)
      yaw_rate_max_deg_s: 30.0
      eps_yaw_deg: 5.0          # 폐합 판정 각도 오차 임계(deg)
      n_stable_yaw: 5           # 폐합 판정에 필요한 연속 안정 주기 수(n_stable_z와 동일 방식)
      # base grip_deg <-> TCP 방향 부호/오프셋 - 실기 캘리브레이션 전까지 항등(1.0/0.0).
      # hardware_ready를 true로 켜기 전 반드시 실기로 확정할 것(부호가 틀리면 그리퍼가 반대로 돎).
      # yaw_offset_deg는 TCP 로컬 프레임에서 grip_deg=0에 해당하는 기준 벡터 방향(deg)이다(servo_loop.py ServoLoop.step 참고).
      yaw_sign: 1.0
      yaw_offset_deg: 0.0
      # yaw 과회전 안전망(should_abort) - 실기 튜닝 대상
      diverge_n_yaw: 15
      diverge_min_delta_deg: 10.0
      v_max: 0.25               # 수평 속도 상한(m/s)
      descend_speed: 0.035       # 하강 속도(m/s)
      # 하강 시작 수평 오차 임계(m) - 1.0은 사실상 기능 비활성화(원래 0.04)
      eps_descend: 1.0
      eps_grasp: 1.0         # 폐합 판정 수평 오차 임계(m)
      n_stable: 1              # 폐합 판정 안정 주기 수 - 현재 비활성 상태(1)
      dt_latency: 0.05          # 지연 보상(lookahead) 시간(s)
      timeout: 10.0              # 서보 전체 타임아웃(s)
      t_lost: 0.3               # 추적 유실 판정 시간(s)
      innov_low: 0.010   # 이 잔차(m) 이하 -> w=1(피드포워드 완전 신뢰)
      innov_high: 0.040  # 이 잔차(m) 이상 -> w=0 + 속도 공분산 리셋
      w_alpha: 0.3        # w의 저역통과 스무딩 계수
      # 폐합 판정 z_gap(m) 임계 - 실측 없이 추정한 값, 실기에서 그리퍼-테이블 간극에 맞게 튜닝 필요
      z_close: 0.018
      # 하강 제동이 표면 위 이 마진(m)에서 속도 0을 겨냥 - z_close보다 반드시 작아야 함(같거나 크면 폐합 조건이 영원히 안 걸림)
      descend_stop_margin_m: 0.015
      n_stable_z: 5       # z_close 판정 안정 주기 수 - depth 노이즈로 인한 조기 정지 방지
      # z_gap 계산에 쓰는 raw z 중앙값 창 크기 - 클수록 노이즈에 강건하지만 반응은 느려짐
      z_stabilize_window: 5
      diverge_n: 15       # 발산 판정 연속 오차 개수(틱 수, 실측 비전 주기 기준)
      # diverge_n틱 연속 증가 + 최소 총 증가폭(m) 요구 - lead_time 외삽만으로 생기는 미세 증가 오탐 방지
      diverge_min_delta_m: 0.01
      cov_threshold: 100.0 # 폐합 판정용 속도 공분산 임계, 일단 끈 상태(1)
      # 폐합 판정용 공구 속도 상한(m/s) - 실기 튜닝 전 관대한 값(기본 0.05)
      v_grasp_max: 2.0
      n_stable_v: 5      # v_grasp_max 판정에 필요한 연속 안정 주기 수(n_stable_z와 동일 방식)
      # 정지 물체도 카메라 노이즈로 v_tool이 완전히 0은 아니게 추정됨 - 이 값 미만이면 피드포워드 기여를 선형으로 줄인다(servo_loop.py step()).
      # 정지 렌치 실측 v_tool 노이즈(p95=10.6mm/s, max=23.2mm/s)보다 크게 잡은 값 - 작으면 노이즈를 못 거르고, 크면 저속 접근 반응이 둔해짐.
      v_tool_deadband_m_s: 0.03
      kalman_q_pos: 1.0e-4      # 프로세스 노이즈(위치)
      kalman_q_vel: 1.0e-2      # 프로세스 노이즈(속도)
      # 측정 노이즈(x,y,z) - 이동 로그 국소회귀 잔차 실측값. 정지 표본분산 그대로 쓰면 칼만 게인이 급등해
      # diverge_n 오탐이 급증한다(정지 표본분산 미사용 이유) - 실기 재검증 필요.
      kalman_r_xy: 1.59019e-06
      kalman_r_z: 9.29874e-08
      kalman_p0_vel_reset: 1.0  # 방향전환 감지 시 속도 공분산 리셋값
      # _validate_servo_command(task_executor.py)의 부동소수점 비교 허용오차
      command_validate_tolerance: 1.0e-6

    # DoosanDriver(doosan_driver.py) 서비스 호출 통신 타임아웃/폴링 간격
    doosan_driver:
      move_service_wait_timeout_s: 2.0        # move_joint/move_line 서비스 연결 확인
      service_wait_timeout_s: 1.0             # 그 외 서비스(move_stop 등) 연결 확인
      future_poll_interval_s: 0.01            # _wait_for_future 내부 폴링 간격
      future_wait_timeout_s: 2.0              # 대부분의 서비스 응답 대기
      compliance_future_wait_timeout_s: 3.0   # task/release_compliance_ctrl 응답 대기
      # dsr_controller2가 서비스/토픽 이름 앞에 붙이는 세그먼트. 새 포크(2026-03-06 이후)를
      # 쓰는 경우 개인 local_params_file에서 controller_name: 'dsr_controller2'로 오버라이드한다
      # (robot_control.launch.py의 local_params_file 인자 참고).
      controller_name: ''

    move:
      vel_deg_s: 30.0    # movej 관절 속도(deg/s)
      acc_deg_s2: 30.0   # movej 관절 가속도(deg/s^2)
      timeout_s: 30.0    # move 서비스 응답 대기 타임아웃(s)

    # hardware_enabled=false(dry-run)에서만 관절값 미설정 named pose 이동을 허용한다 -
    # true일 때는 이 값과 무관하게 항상 거부된다(robot_control_node._call_move_service 참고).
    dry_run:
      allow_unconfigured_named_poses: true

    # base_link->link_6 TF 방송 + servo_pick TCP 캐시 갱신 폴링 주기(robot_control_node._on_tf_broadcast_timer).
    # safety.state_poll과 처리량을 나눠 써야 해 50Hz는 과함 - state_poll과 같은 10Hz로 낮춤(v_max=0.25m/s 대비 tf2 보간으로 충분).
    tf_broadcast:
      period_s: 0.1

    servo_pick:
      # ToolTrack이 base_link 절대좌표라는 계약을 검증하는 유일한 허용 frame_id (TF 변환 미구현)
      tool_track_frame_id: 'base_link'
      # servo.descend_accel_m_s2로도 공유되는 speedl 병진 가속도 상한(mm/s²) - 실기에서 진동 없이 확인된 값
      speedl_acc_trans_mm_s2: 400.0
      # TCP 캐시 샘플 나이(s) 상한 - 통신 타이밍 설정(하드웨어 캘리브레이션 아님)
      tcp_pose_max_age_s: 0.2
      # TCP 캐시 갱신은 tf_broadcast.period_s 폴링에 얹혀 이뤄진다(별도 파라미터 없음)
      # SpeedlWatchdog(speedl_watchdog.py) 내부 폴링 주기
      watchdog_poll_interval_s: 0.05
      # 그리퍼 폐합 확인 직후 z를 이만큼(m) 들어올림 - 검증 실패해도 원위치로 되돌리지 않음
      lift_height_m: 0.05
      # 들어올림 전용 속도 - 위쪽은 장애물 없어 descend_speed보다 빠르게 설정
      lift_speed_m_s: 0.15
      # 목표 높이 미도달 시 무한 루프 방지 안전 타임아웃(s)
      lift_timeout_s: 5.0
      # hardware_ready는 아래가 모두 확인되기 전까지 false 유지: ToolTrack.orientation 의미,
      # servo.yaw_sign/yaw_offset_deg 실기 캘리브레이션, TCP/그리퍼 offset, SpeedlStream 단위, 실제 M0609 저속 검증.
      # (기본값은 코드 declare_parameter에 있음 - 여기서 실수로 true를 채우지 않기 위해 재기재하지 않음)

    # handover_safe 도착 후 손(/vision/hand_track)에 접근하는 RT 서보 루프(HandServoLoop) -
    # vision_node가 hand_track을 연속 발행/주먹 판정하지 않는 동안은 hardware_ready=false로 게이트됨.
    handover_servo:
      # HandTrack이 base_link 절대좌표라는 계약을 검증하는 유일한 허용 frame_id.
      hand_track_frame_id: 'base_link'
      tcp_pose_max_age_s: 0.2
      watchdog_poll_interval_s: 0.05
      kp_xy: 1.4
      kp_z: 1.4
      v_max: 0.15         # 사람에게 접근하는 동작이라 servo_pick(0.25)보다 보수적으로 낮게 둔다
      offset_m: 0.10       # 사용자 확정값 - TCP->손 방향 위, 손 앞 20cm 지점에서 추종을 멈춘다
      t_lost_s: 10.0
      timeout_s: 60.0      # 사용자는 "주먹까지 계속 추종"을 원하므로 넉넉히 잡는다(0이면 비활성)
      command_validate_tolerance: 1.0e-6
      # hardware_ready는 vision_node의 hand_track 연속 발행/주먹 판정이 구현·검증되기
      # 전까지 반드시 false로 유지한다(기본값은 코드 declare_parameter, 여기서는 재기재하지 않음).

    handover_hold:
      # TODO(캘리브레이션 필요): 실제 그리퍼-TCP 장착 방향에 따라 결정 - 미설정(-1)이면 당김 감지 비활성(오탐 방지 기본값)
      pull_axis_index: 1    # 0=x,1=y,2=z,3=rx,4=ry,5=rz (tool_force 기준)
      pull_direction_sign: 1  # 1 또는 -1
      pull_force_threshold_n: 2.0 # 이 값(N)을 넘으면 당김으로 판정 - 실기 튜닝 대상

    safety:
      # 외력 감지는 dsr_msgs2 서비스가 아니라 DRFL 라이브러리(libdsr_hardware2.so)에 ctypes로 직접 연결한다 -
      # ROS2 executor와 무관한 독립 쓰레드에서 고주기 폴링하여 MOVING 중에도 실시간으로 감지된다.
      # 관절별 절대 임계값 하나만 넘으면 FAULT(MOVING/STANDBY 구분 없음).
      #
      # direct_threshold_nm은 M0609 관절별 정격 토크 비율을 참고한 추정값 - 관절별 실측 전이라 재조정 필요.
      # 임계 초과 시 on_triggered가 edge-trigger로 1회 호출되고, 이후 direct_reset_below_count번 연속
      # 미만이어야 내부 트립 래치가 풀려 재무장된다(FAULT 상태 자체 해제는 아님 - 그건 /robot/recover가 처리).
      #
      # drfl_lib_path/robot_ip/robot_port는 이 PC의 cobot_ws 설치 경로/roboton 실행 인자에 맞춘 값이다.
      external_torque:
        # '~'는 os.path.expanduser로 실행 계정 홈 디렉터리로 치환된다(robot_control_node._init_drfl_force_monitor)
        drfl_lib_path: '~/cobot_ws/install/dsr_hardware2/lib/libdsr_hardware2.so'
        robot_ip: '192.168.1.100'  # M0609 실제 IP - roboton(dsr_bringup2) 실행 인자와 일치해야 함
        robot_port: 12345          # M0609 DRFL 포트
        direct_poll_hz: 100.0      # DRFL 직접 연결 외력 폴링 주파수(Hz)
        direct_threshold_nm: [25.0, 25.0, 25.0, 25.0, 25.0, 25.0]  # TODO: 관절별 실기 캘리브레이션 필요
        direct_reset_below_count: 20  # on_triggered 재무장까지 연속 임계값 미만 횟수(히스테리시스) - FAULT 자체 해제는 아님, 아래 참고
        # DrflForceMonitor.stop()이 폴링 스레드 종료를 기다리는 타임아웃
        stop_join_timeout_s: 2.0
      fault_stop_mode: 1  # TODO(전문가 검토 필요): MoveStop stop_mode 0~3 중 선택
      # diverging/timeout/tracking_lost/취소처럼 위험 상황이 아닌 정상 회수 정지용
      # (_run_rt_tracking cancel/abort 분기) - fault_stop_mode(QUICK)는 실제 안전
      # FAULT 전용으로 남겨 둔다. 0=QUICK_STO, 1=QUICK, 2=SLOW, 3=HOLD(비상정지).
      recoverable_stop_mode: 2
      # robot_state(두산 자체 안전 상태) 조회 및 FAULT 판정(_on_state_poll_timer)용 폴링 주기 -
      # 외력 감지는 DrflForceMonitor가 전담한다.
      state_poll_period_s: 0.1
