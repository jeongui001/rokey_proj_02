# 이 컴퓨터에서만 다른, 팀과 공유하면 안 되는(또는 공유할 필요 없는) 값들의
# 자리 표시자. 기본값은 아무 파라미터도 없어 robot_control_params.yaml /
# robot_control_calibration_params.yaml 위에 아무것도 덮어쓰지 않는다.
#
# 예: 이 개발 머신은 doosan-robot2를 2026-03-06 이후의 새 포크(~/cobot_ws)로
# 쓰고 있어 dsr_controller2 서비스/토픽 이름 앞에 세그먼트가 하나 더 붙는다
# (robot_control/robot_control/doosan_driver.py 참고). 팀 대부분은 옛 포크라
# robot_control_params.yaml의 기본값(controller_name: '')을 그대로 써야 하므로,
# 이 머신만 아래처럼 별도(gitignore된) 파일에 오버라이드해서 쓴다:
#
#   1. dev/ 아래(이미 .gitignore에 등록됨, 커밋 대상 아님) 개인 override 파일을
#      만든다. 예: dev/local_params.yaml
#        /**:
#          ros__parameters:
#            doosan_driver:
#              controller_name: 'dsr_controller2'
#   2. launch 시 local_params_file 인자로 그 경로를 넘긴다:
#        ros2 launch task_manager handover_system.launch.py \
#          local_params_file:=/home/rokey/rokey_proj_02/dev/local_params.yaml
#
# 이 파일 자체(robot_control_local_params.yaml)는 커밋되는 "빈 기본값"이라
# 직접 수정하지 않는다 - 개인 값은 항상 dev/ 아래 별도 파일로 관리한다.
/**:
  ros__parameters: {}
