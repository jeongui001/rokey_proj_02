# robot_control 실측 캘리브레이션 파라미터 (robot_control_params.yaml 위에 override) - 하드웨어 종속 실측값만 담는다.
#
# 사용법: launch 시 params_file 인자로 robot_control_params.yaml과 함께 넘기거나, 명령행 -p 오버라이드로 사용:
#   ros2 launch robot_control robot_control.launch.py \
#     params_file:=<share>/robot_control/config/robot_control_calibration_params.yaml
/**:
  ros__parameters:
    # 실측: 정지 시 fx<=2.3, 당김 시 4~12로 상승(fy/fz는 baseline과 겹쳐 신뢰도 낮음)
    # confirm_samples로 순간 힘 스파이크에 의한 오탐(PULLED 오판)을 방지 - threshold/samples는 실기 재검증 필요
    handover_hold:
      pull_axis_index: 1      
      pull_direction_sign: 1
      pull_force_threshold_n: 2.0
      pull_confirm_samples: 3

    # 좌표 변환 자체는 결함 없음 확인됨, 실기 검증 이력 없음 - 문제 발생 시 false로 되돌리는 것이 첫 대응
    servo_pick:
      hardware_ready: true
    # 저속(v_max=0.15m/s) 실기 검증용 - 문제 발생 시 false로 되돌리는 것이 첫 대응(servo_pick과 동일 원칙)
    handover_servo:
      hardware_ready: true
